<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeBlue - App Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: #060E1A;
    color: #E2E8F0;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: #0A1628;
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    height: 100vh;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sidebar-header h1 {
    font-size: 1.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #135BEC, #0DD5C4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sidebar-header p {
    font-size: 0.7rem;
    color: #64748B;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-top: 2px;
  }
  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 12px 10px;
  }
  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .nav-group {
    margin-bottom: 16px;
  }
  .nav-group-title {
    font-size: 0.65rem;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    padding: 8px 12px 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.85rem;
    font-weight: 500;
    color: #94A3B8;
    border: 1px solid transparent;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.04);
    color: #E2E8F0;
  }
  .nav-item.active {
    background: rgba(19, 91, 236, 0.15);
    color: #60A5FA;
    border-color: rgba(19, 91, 236, 0.2);
    font-weight: 600;
  }
  .nav-item .material-symbols-outlined {
    font-size: 1.2rem;
  }
  .nav-item .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 700;
    background: rgba(255,255,255,0.06);
    color: #64748B;
    flex-shrink: 0;
  }
  .nav-item.active .num {
    background: rgba(19, 91, 236, 0.3);
    color: #60A5FA;
  }

  .back-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 16px 20px;
    color: #64748B;
    font-size: 0.8rem;
    font-weight: 500;
    text-decoration: none;
    border-top: 1px solid rgba(255,255,255,0.06);
    transition: color 0.2s;
  }
  .back-link:hover { color: #E2E8F0; }
  .back-link .material-symbols-outlined { font-size: 1rem; }

  /* Main area */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #060E1A;
    position: relative;
  }

  /* Phone frame */
  .phone-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    border: 4px solid #1E293B;
    background: #0A1628;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 25px 80px rgba(0,0,0,0.5);
  }
  .phone-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 28px;
    background: #0A1628;
    border-radius: 0 0 20px 20px;
    z-index: 10;
  }
  .phone-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #0A1628;
  }

  /* Navigation arrows */
  .nav-arrows {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-arrow {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: #94A3B8;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-arrow:hover:not(:disabled) {
    background: rgba(19, 91, 236, 0.2);
    border-color: rgba(19, 91, 236, 0.3);
    color: #60A5FA;
  }
  .nav-arrow:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .nav-arrow .material-symbols-outlined { font-size: 1.2rem; }
  .screen-counter {
    font-size: 0.8rem;
    color: #64748B;
    font-weight: 600;
    min-width: 60px;
    text-align: center;
  }

  /* Responsive */
  @media (max-height: 900px) {
    .phone-frame { width: 340px; height: 736px; border-radius: 38px; }
  }
  @media (max-width: 700px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>BE BLUE</h1>
    <p>App Mobile</p>
  </div>
  <div class="sidebar-nav" id="navList"></div>
  <a class="back-link" href="index.html">
    <span class="material-symbols-outlined">arrow_back</span>
    Volver al inicio
  </a>
</div>

<div class="main">
  <div class="phone-container">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <iframe id="screenFrame" src="mobile/01-welcome.html"></iframe>
    </div>
    <div class="nav-arrows">
      <button class="nav-arrow" id="prevBtn" onclick="navigate(-1)">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <span class="screen-counter" id="counter">1 / 15</span>
      <button class="nav-arrow" id="nextBtn" onclick="navigate(1)">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
    </div>
  </div>
</div>

<script>
const screens = [
  { file: 'mobile/01-welcome.html', title: 'Welcome', icon: 'waving_hand', group: 'onboarding' },
  { file: 'mobile/02-login.html', title: 'Login', icon: 'lock', group: 'onboarding' },
  { file: 'mobile/03-onboarding.html', title: 'Onboarding Lifestyle', icon: 'assignment', group: 'onboarding' },
  { file: 'mobile/04-home-dashboard.html', title: 'Home Dashboard', icon: 'home', group: 'core' },
  { file: 'mobile/05-program-overview.html', title: 'Programa', icon: 'view_agenda', group: 'core' },
  { file: 'mobile/06-calendar.html', title: 'Calendario', icon: 'calendar_today', group: 'core' },
  { file: 'mobile/07-progress-avatar.html', title: 'Progreso & Avatar', icon: 'trending_up', group: 'core' },
  { file: 'mobile/08-profile.html', title: 'Perfil', icon: 'person', group: 'core' },
  { file: 'mobile/09-exercise.html', title: 'Ejercicio', icon: 'fitness_center', group: 'pilares' },
  { file: 'mobile/10-therapies.html', title: 'Terapias Recovery', icon: 'spa', group: 'pilares' },
  { file: 'mobile/11-booking.html', title: 'Reservas', icon: 'event_available', group: 'pilares' },
  { file: 'mobile/12-nutrition.html', title: 'Nutricion', icon: 'restaurant', group: 'pilares' },
  { file: 'mobile/13-supplementation.html', title: 'Suplementacion', icon: 'medication', group: 'pilares' },
  { file: 'mobile/14-daily-checkin.html', title: 'Check-in Diario', icon: 'check_circle', group: 'extra' },
  { file: 'mobile/15-connected-devices.html', title: 'Dispositivos', icon: 'watch', group: 'extra' },
];

const groups = {
  onboarding: 'Onboarding',
  core: 'App Principal',
  pilares: '4 Pilares',
  extra: 'Extras'
};

let current = 0;

function buildNav() {
  const nav = document.getElementById('navList');
  let html = '';
  let lastGroup = '';
  screens.forEach((s, i) => {
    if (s.group !== lastGroup) {
      lastGroup = s.group;
      html += `<div class="nav-group"><div class="nav-group-title">${groups[s.group]}</div>`;
    }
    html += `<div class="nav-item ${i === 0 ? 'active' : ''}" data-idx="${i}" onclick="goTo(${i})">
      <span class="num">${i + 1}</span>
      <span class="material-symbols-outlined">${s.icon}</span>
      ${s.title}
    </div>`;
    const next = screens[i + 1];
    if (!next || next.group !== s.group) html += '</div>';
  });
  nav.innerHTML = html;
}

function goTo(idx) {
  current = idx;
  document.getElementById('screenFrame').src = screens[idx].file;
  document.getElementById('counter').textContent = `${idx + 1} / ${screens.length}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === screens.length - 1;

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });

  // scroll active into view
  const active = document.querySelector('.nav-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < screens.length) goTo(next);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
});

buildNav();
goTo(0);
</script>

</body>
</html>
